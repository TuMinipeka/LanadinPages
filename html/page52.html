<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style52.css">
    <title>Create your own style</title>
</head>
<body>
    <div class="general">

        <!-- TÍTULO: fuera de las columnas, ocupa todo el ancho -->
        <div class="titulo">
            <img src="../image/image52/headtext.png" alt="Titulo">
        </div>

        <!-- CONTENIDO: dos columnas -->
        <div class="content">

            <!-- COLUMNA IZQUIERDA -->
            <div class="left">
                <img class="left-img" src="../image/image52/principal.jpg" alt="imagen principal">
                <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                    Cursus imperdiet sed id elementum. Quam vel aliquam
                    sit vulputate. Faucibus nec gravida ipsum pulvinar vel.</p>
                <button class="button">Sign up</button>
            </div>

            <!-- COLUMNA DERECHA -->
            <div class="medium">

                <!-- ARRIBA: logo + estadísticas -->
                <div class="up">
                    <img class="logo" src="../image/image52/font circle.png" alt="logo circular">
                    <div class="stats-grid">
                        <div class="stat">
                            <h2>28K</h2>
                            <p>Lorem ipsum <br> dolor sit amet</p>
                        </div>
                        <div class="stat">
                            <h2>16K</h2>
                            <p>Lorem ipsum <br> dolor sit amet</p>
                        </div>
                        <div class="stat">
                            <h2>986</h2>
                            <p>Lorem ipsum <br> dolor sit amet</p>
                        </div>
                        <div class="stat">
                            <h2>35K+</h2>
                            <p>Lorem ipsum <br> dolor sit amet</p>
                        </div>
                    </div>
                </div>

                <!-- ABAJO: dos imágenes -->
                <div class="under">
                    <img class="under-img" src="../image/image52/gafasyteclado.jpg" alt="gafas y teclado">
                    <img class="under-img-ulti" src="../image/image52/gafas.jpg" alt="gafas de sol">
                </div>

            </div>
        </div>
    </div>
</body>
</html>
